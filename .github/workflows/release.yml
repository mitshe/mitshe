name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., latest, v1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/mitshe/api:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/mitshe/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/mitshe/web:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/mitshe/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Executor image
        uses: docker/build-push-action@v6
        with:
          context: apps/api/docker/executor
          file: apps/api/docker/executor/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/mitshe/executor:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/mitshe/executor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Light image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/light/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/mitshe/light:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/mitshe/light:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/mitshe/api | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/mitshe/web | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/mitshe/executor | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/mitshe/light | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
