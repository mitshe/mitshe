name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: cd apps/desktop && pnpm install
      - run: cd apps/desktop && pnpm package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: apps/desktop/release/*.dmg

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: cd apps/desktop && pnpm install
      - run: cd apps/desktop && pnpm package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: apps/desktop/release/*.exe

  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: cd apps/desktop && pnpm install
      - run: cd apps/desktop && pnpm package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: apps/desktop/release/*.AppImage

  upload-to-release:
    needs: [package-mac, package-windows, package-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: desktop-mac, path: release }
      - uses: actions/download-artifact@v4
        with: { name: desktop-win, path: release }
      - uses: actions/download-artifact@v4
        with: { name: desktop-linux, path: release }
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
