# Cloudflare Tunnel Configuration
#
# Setup:
# 1. cloudflared tunnel login
# 2. cloudflared tunnel create mitshe
# 3. Copy credentials.json to this folder
# 4. Update tunnel ID below
# 5. Add DNS records in Cloudflare dashboard

tunnel: YOUR_TUNNEL_ID  # Replace with your tunnel ID
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Web app (Next.js)
  - hostname: app.mitshe.com
    service: http://web-blue:3000

  # API (NestJS)
  - hostname: api.mitshe.com
    service: http://api-blue:3001

  # WebSocket support for API
  - hostname: api.mitshe.com
    path: /socket.io/*
    service: http://api-blue:3001
    originRequest:
      noTLSVerify: true

  # Catch-all (required)
  - service: http_status:404
