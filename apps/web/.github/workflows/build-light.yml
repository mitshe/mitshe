name: Build mitshe-light

on:
  # When frontend (this repo) changes
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

  # Nightly build (catches backend changes)
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily

  # Manual trigger
  workflow_dispatch:
    inputs:
      api_branch:
        description: 'API repository branch'
        required: false
        default: 'main'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mitshe/light

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout web repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/light/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_BRANCH=${{ github.event.inputs.api_branch || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate install script
        run: |
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  mitshe-light installer"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # Check Docker
          if ! command -v docker &> /dev/null; then
              echo "❌ Docker is required but not installed."
              echo "   Install Docker: https://docs.docker.com/get-docker/"
              exit 1
          fi

          echo "✅ Docker found"
          echo ""

          # Pull latest image
          echo "📥 Pulling mitshe-light image..."
          docker pull ghcr.io/mitshe/light:latest

          echo ""
          echo "✅ Installation complete!"
          echo ""
          echo "To start mitshe-light, run:"
          echo ""
          echo "  docker run -d \\"
          echo "    --name mitshe \\"
          echo "    -p 3000:3000 \\"
          echo "    -p 3001:3001 \\"
          echo "    -v mitshe-data:/app/data \\"
          echo "    -e CLERK_SECRET_KEY=your_clerk_secret \\"
          echo "    -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=your_clerk_key \\"
          echo "    ghcr.io/mitshe/light:latest"
          echo ""
          echo "Then open http://localhost:3000"
          echo ""
          EOF

      - name: Upload install script as artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-script
          path: install.sh
