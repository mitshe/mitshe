# mitshe-light: Single container deployment
# Run with: docker-compose up -d

services:
  mitshe:
    image: ghcr.io/mitshe/light:latest
    container_name: mitshe
    restart: unless-stopped
    ports:
      - "3000:3000"  # Frontend
      - "3001:3001"  # API
    volumes:
      - mitshe-data:/app/data
    environment:
      # Required: Get these from https://clerk.com
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?Please set CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Please set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}

      # Optional: AI providers (BYOK)
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Optional: Encryption key (auto-generated if not set, but won't persist across restarts)
      # - ENCRYPTION_KEY=${ENCRYPTION_KEY}

volumes:
  mitshe-data:
