<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>mitshe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #2a2a35;
      color: #a0a0b0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .container { text-align: center; -webkit-app-region: no-drag; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #3a3a48;
      border-top-color: #6B6EF4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; color: #d0d0dd; }
    p { font-size: 0.85rem; line-height: 1.5; }
    a { color: #6B6EF4; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .error { color: #f87171; }
    #status { margin-top: 0.5rem; font-size: 0.75rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="spinner"></div>
      <h2>Starting mitshe</h2>
      <p>Preparing your workspace...</p>
      <div id="status"></div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    window.addEventListener('message', (event) => {
      const el = document.getElementById('content');
      if (event.data.type === 'docker-missing') {
        el.innerHTML = `
          <h2>Docker Desktop Required</h2>
          <p>mitshe needs Docker to run AI coding sessions.</p>
          <p style="margin-top:1rem"><a href="https://docker.com/products/docker-desktop">Download Docker Desktop</a></p>
        `;
      } else if (event.data.type === 'failed') {
        el.innerHTML = `
          <h2 class="error">Failed to Start</h2>
          <p>${event.data.message || 'Could not start mitshe container.'}</p>
          <p style="margin-top:1rem">Make sure Docker Desktop is running.</p>
        `;
      } else if (event.data.type === 'status') {
        document.getElementById('status').textContent = event.data.message;
      }
    });
  </script>
</body>
</html>
