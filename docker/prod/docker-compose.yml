services:
  landing:
    build:
      context: ../..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  mitshe:
    build:
      context: ../..
      dockerfile: docker/light/Dockerfile
      args:
        DB_PROVIDER: postgresql
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NEXT_PUBLIC_APP_URL=https://app.mitshe.com
      - NEXT_PUBLIC_API_URL=https://api.mitshe.com
      - NEXT_PUBLIC_WS_URL=wss://api.mitshe.com
      - DATABASE_URL=postgresql://mitshe:${POSTGRES_PASSWORD}@postgres:5432/mitshe
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mitshe
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mitshe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitshe"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
