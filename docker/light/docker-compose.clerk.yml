# mitshe-light with Clerk authentication
#
# This requires Clerk keys for authentication.
# Get keys from https://clerk.com
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your Clerk keys
#   docker compose -f docker-compose.clerk.yml up

services:
  mitshe:
    build:
      context: ../..
      dockerfile: docker/light/Dockerfile
      args:
        - AUTH_MODE=clerk
    image: ghcr.io/mitshe/light:clerk
    container_name: mitshe
    restart: unless-stopped
    ports:
      - "3000:3000"  # Frontend
      - "3001:3001"  # API
    volumes:
      - mitshe-data:/build/data
    environment:
      # Clerk mode - authentication required
      - AUTH_MODE=clerk

      # Required: Clerk authentication
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?Please set CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Please set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}

      # Optional: Encryption key (auto-generated if not set)
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}

      # Database (SQLite - built into container)
      - DATABASE_URL=file:/build/data/mitshe.db

      # Redis (built into container)
      - REDIS_URL=redis://localhost:6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  mitshe-data:
    name: mitshe-data
