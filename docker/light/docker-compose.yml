services:
  mitshe:
    build:
      context: ../..
      dockerfile: docker/light/Dockerfile
    image: ghcr.io/mitshe/mitshe:latest
    container_name: mitshe
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - mitshe-data:/build/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTH_MODE=selfhosted
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DATABASE_URL=file:/build/data/mitshe.db
      - REDIS_URL=redis://localhost:6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  mitshe-data:
    name: mitshe-data
